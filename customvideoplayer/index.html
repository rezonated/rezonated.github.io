<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/progress.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="shortcut icon" href="" />

    <script
      src="https://kit.fontawesome.com/4c3b8a193c.js"
      crossorigin="anonymous"
    ></script>
    <title>Custom JS Video Player</title>
  </head>
  <body>
    <h1>Custom JS Video Player</h1>
    <video
      src="videos/orangjualan.mp4"
      id="video"
      class="screen"
      poster="img/poster.png"
    ></video>
    <div class="controls">
      <button class="btn" id="play">
        <i class="fa fa-play fa-2x"></i></button
      ><button class="btn" id="stop"><i class="fa fa-stop fa-2x"></i></button>
      <input
        type="range"
        id="progress"
        class="progress"
        min="0"
        max="100"
        step="0.1"
        value="0"
      />
      <span class="timestamp" id="timestamp">00:00</span>
    </div>
    <h1>
      Credit goes to
      <a href="https://www.youtube.com/watch?v=M96Q7qLIgFw">SkyCorp</a>
    </h1>
    <script src="script.js"></script>
  </body>
</html>
